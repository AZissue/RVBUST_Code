<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术支持工单与客户管理系统</title>
<style>
/* ===== CSS Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; line-height: 1.6; min-height: 100vh; }
a { text-decoration: none; color: inherit; }
ul, ol { list-style: none; }
img { max-width: 100%; display: block; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea, select { font-family: inherit; font-size: 1rem; }

/* ===== CSS Variables ===== */
:root {
  --primary: #1890ff; --primary-dark: #096dd9; --primary-light: #e6f7ff;
  --success: #52c41a; --success-light: #f6ffed;
  --warning: #faad14; --warning-light: #fffbe6;
  --danger: #ff4d4f; --danger-light: #fff1f0;
  --info: #13c2c2; --info-light: #e6fffb;
  --text: #262626; --text-secondary: #595959; --text-muted: #8c8c8c;
  --border: #d9d9d9; --border-light: #f0f0f0;
  --bg: #f0f2f5; --bg-white: #fff; --bg-sidebar: #001529;
  --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 4px 16px rgba(0,0,0,0.12);
  --radius: 6px; --radius-lg: 8px;
  --sidebar-width: 220px; --header-height: 64px;
}

/* ===== Layout ===== */
.app-layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-width); background: var(--bg-sidebar); color: #fff;
  position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
  transition: transform .3s; overflow-y: auto;
}
.sidebar-brand { padding: 16px; font-size: 1.1rem; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
.sidebar-brand .icon { font-size: 1.4rem; }
.sidebar-nav { padding: 8px 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: rgba(255,255,255,0.7); transition: all .2s; cursor: pointer; }
.nav-item:hover, .nav-item.active { background: #1890ff; color: #fff; }
.nav-item .icon { font-size: 1.1rem; width: 20px; text-align: center; }
.nav-group-title { padding: 12px 20px 4px; font-size: .75rem; color: rgba(255,255,255,0.45); text-transform: uppercase; letter-spacing: .5px; }
.main { flex: 1; margin-left: var(--sidebar-width); min-height: 100vh; display: flex; flex-direction: column; }
.header {
  height: var(--header-height); background: #fff; border-bottom: 1px solid var(--border-light);
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.menu-toggle { display: none; font-size: 1.3rem; color: var(--text-secondary); }
.header-right { display: flex; align-items: center; gap: 16px; }
.badge-btn { position: relative; padding: 8px; color: var(--text-secondary); font-size: 1.1rem; }
.badge-btn .badge {
  position: absolute; top: 4px; right: 4px; min-width: 16px; height: 16px; padding: 0 4px;
  background: var(--danger); color: #fff; font-size: .65rem; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.user-info { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: var(--radius); }
.user-info:hover { background: var(--bg); }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 600; }
.content { flex: 1; padding: 24px; overflow-y: auto; }
.page-title { font-size: 1.4rem; font-weight: 600; margin-bottom: 20px; color: var(--text); }

/* ===== Mobile Sidebar Overlay ===== */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

/* ===== Cards ===== */
.card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-weight: 600; font-size: 1.05rem; }
.card-body { padding: 20px; }

/* ===== Stats Row ===== */
.stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 20px; display: flex; align-items: center; gap: 16px; }
.stat-icon { width: 48px; height: 48px; border-radius: var(--radius); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
.stat-icon.blue { background: var(--primary-light); color: var(--primary); }
.stat-icon.green { background: var(--success-light); color: var(--success); }
.stat-icon.orange { background: var(--warning-light); color: var(--warning); }
.stat-icon.red { background: var(--danger-light); color: var(--danger); }
.stat-icon.cyan { background: var(--info-light); color: var(--info); }
.stat-value { font-size: 1.6rem; font-weight: 700; color: var(--text); }
.stat-label { font-size: .85rem; color: var(--text-muted); }

/* ===== Buttons ===== */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); font-size: .9rem; transition: all .2s; border: 1px solid transparent; cursor: pointer; }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover:not(:disabled) { background: #389e0d; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover:not(:disabled) { background: #d48806; }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover:not(:disabled) { background: #cf1322; }
.btn-default { background: #fff; border-color: var(--border); color: var(--text); }
.btn-default:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 4px 12px; font-size: .85rem; }
.btn-lg { padding: 10px 24px; font-size: 1rem; }
.btn-group { display: flex; gap: 8px; }

/* ===== Forms ===== */
.form-group { margin-bottom: 16px; }
.form-label { display: block; margin-bottom: 6px; font-size: .9rem; color: var(--text-secondary); font-weight: 500; }
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  background: #fff; color: var(--text); transition: border-color .2s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(24,144,255,0.1); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-hint { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ===== Tables ===== */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px 16px; text-align: left; font-size: .9rem; }
.data-table thead th { background: #fafafa; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border-light); white-space: nowrap; }
.data-table tbody tr { border-bottom: 1px solid var(--border-light); transition: background .2s; }
.data-table tbody tr:hover { background: #fafafa; }
.data-table td { color: var(--text); }

/* ===== Tags ===== */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: .8rem; font-weight: 500; }
.tag-blue { background: var(--primary-light); color: var(--primary); }
.tag-green { background: var(--success-light); color: var(--success); }
.tag-orange { background: var(--warning-light); color: var(--warning); }
.tag-red { background: var(--danger-light); color: var(--danger); }
.tag-gray { background: #f5f5f5; color: var(--text-muted); }

/* ===== Status ===== */
.status { display: inline-flex; align-items: center; gap: 4px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; }
.status-dot.blue { background: var(--primary); }
.status-dot.green { background: var(--success); }
.status-dot.orange { background: var(--warning); }
.status-dot.red { background: var(--danger); }
.status-dot.gray { background: #bfbfbf; }

/* ===== Search & Filters ===== */
.search-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 200px; position: relative; }
.search-input input { width: 100%; padding: 8px 12px 8px 36px; border: 1px solid var(--border); border-radius: var(--radius); }
.search-input::before { content: "🔍"; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: .5; font-size: .9rem; }
.filter-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== Empty State ===== */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: .5; }
.empty-state .title { font-size: 1.1rem; color: var(--text-secondary); margin-bottom: 8px; }

/* ===== Modal ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: #fff; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: modalIn .2s ease; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-weight: 600; font-size: 1.05rem; }
.modal-close { font-size: 1.3rem; color: var(--text-muted); cursor: pointer; padding: 4px; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 20px; }
.modal-footer { padding: 12px 20px; border-top: 1px solid var(--border-light); display: flex; justify-content: flex-end; gap: 8px; }
@keyframes modalIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Dropdown ===== */
.dropdown { position: relative; }
.dropdown-menu { position: absolute; right: 0; top: 100%; margin-top: 4px; background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); border: 1px solid var(--border-light); min-width: 160px; z-index: 150; display: none; }
.dropdown.open .dropdown-menu { display: block; }
.dropdown-item { padding: 10px 16px; cursor: pointer; font-size: .9rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
.dropdown-item:hover { background: #f5f5f5; }

/* ===== Login Page ===== */
.login-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0c4a6e 0%, #1e3a5f 25%, #2563eb 60%, #7c3aed 100%);
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.login-page::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 70%, rgba(37,99,235,0.15) 0%, transparent 50%),
              radial-gradient(circle at 70% 30%, rgba(124,58,237,0.12) 0%, transparent 50%);
  animation: gradientMove 20s ease-in-out infinite;
}
@keyframes gradientMove {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(-2%, 2%) rotate(1deg); }
  66% { transform: translate(2%, -2%) rotate(-1deg); }
}
.login-float-shapes {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.login-float-shapes span {
  position: absolute;
  display: block;
  width: 20px;
  height: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  animation: floatShape 15s linear infinite;
}
.login-float-shapes span:nth-child(1) { top: 10%; left: 10%; width: 40px; height: 40px; animation-duration: 18s; animation-delay: 0s; }
.login-float-shapes span:nth-child(2) { top: 20%; left: 80%; width: 25px; height: 25px; animation-duration: 22s; animation-delay: 2s; border-radius: 50%; }
.login-float-shapes span:nth-child(3) { top: 60%; left: 15%; width: 60px; height: 60px; animation-duration: 16s; animation-delay: 4s; }
.login-float-shapes span:nth-child(4) { top: 40%; left: 60%; width: 30px; height: 30px; animation-duration: 20s; animation-delay: 1s; border-radius: 50%; }
.login-float-shapes span:nth-child(5) { top: 80%; left: 70%; width: 45px; height: 45px; animation-duration: 24s; animation-delay: 3s; }
.login-float-shapes span:nth-child(6) { top: 30%; left: 40%; width: 15px; height: 15px; animation-duration: 14s; animation-delay: 5s; border-radius: 50%; }
@keyframes floatShape {
  0% { transform: translateY(0) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
}
.login-card {
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 20px;
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.1) inset;
  width: 100%;
  max-width: 440px;
  padding: 48px 40px;
  position: relative;
  z-index: 1;
  animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardSlideUp {
  from { opacity: 0; transform: translateY(30px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.login-header { text-align: center; margin-bottom: 36px; }
.login-header .logo-wrap {
  width: 72px;
  height: 72px;
  margin: 0 auto 20px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  box-shadow: 0 8px 24px rgba(37,99,235,0.3);
  animation: logoPulse 2s ease-in-out infinite;
}
@keyframes logoPulse {
  0%, 100% { box-shadow: 0 8px 24px rgba(37,99,235,0.3); transform: scale(1); }
  50% { box-shadow: 0 12px 32px rgba(37,99,235,0.4); transform: scale(1.02); }
}
.login-header h1 { font-size: 1.6rem; color: var(--text); margin-bottom: 6px; font-weight: 700; }
.login-header p { color: var(--text-muted); font-size: .95rem; }
.login-form .form-group { margin-bottom: 24px; }
.login-form .form-group label { display: flex; align-items: center; justify-content: space-between; }
.login-form .form-group label .form-label { font-size: .9rem; font-weight: 500; color: var(--text-secondary); }
.login-form .form-input {
  width: 100%;
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: #fff;
}
.login-form .form-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(24,144,255,0.1);
  transform: translateY(-1px);
}
.login-form .input-wrap { position: relative; }
.login-form .input-wrap .toggle-pass {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1.1rem;
  user-select: none;
  transition: color 0.2s;
}
.login-form .input-wrap .toggle-pass:hover { color: var(--primary); }
.login-form .input-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 1rem;
}
.login-form .input-wrap.with-icon .form-input { padding-left: 42px; }
.login-form .btn-login {
  width: 100%;
  padding: 14px;
  font-size: 1.05rem;
  font-weight: 600;
  border-radius: 12px;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: #fff;
  border: none;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.login-form .btn-login:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(37,99,235,0.35);
}
.login-form .btn-login:active:not(:disabled) { transform: translateY(0); }
.login-form .btn-login:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}
.login-form .btn-login .spinner {
  display: inline-block;
  width: 18px;
  height: 18px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-right: 8px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.login-form .remember-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  font-size: 0.9rem;
}
.login-form .remember-label {
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  color: var(--text-secondary);
}
.login-form .remember-label input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--primary);
  cursor: pointer;
}
.login-tips {
  margin-top: 24px;
  padding: 14px 16px;
  background: linear-gradient(135deg, #f0f9ff, #e0f2fe);
  border: 1px solid #bae6fd;
  border-radius: 12px;
  font-size: .85rem;
  color: #0369a1;
  position: relative;
  overflow: hidden;
}
.login-tips::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 4px;
  background: linear-gradient(to bottom, #2563eb, #7c3aed);
}
.login-tips strong { color: #1e3a5f; }
.login-version {
  position: absolute;
  bottom: 16px;
  right: 20px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.4);
  z-index: 1;
}

/* ===== Tabs ===== */
.tabs { display: flex; border-bottom: 1px solid var(--border-light); margin-bottom: 20px; gap: 4px; }
.tab { padding: 10px 16px; cursor: pointer; color: var(--text-secondary); font-size: .9rem; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .2s; }
.tab:hover { color: var(--primary); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ===== Timeline ===== */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ""; position: absolute; left: 7px; top: 4px; bottom: 4px; width: 2px; background: var(--border-light); }
.timeline-item { position: relative; padding-bottom: 20px; }
.timeline-dot { position: absolute; left: -20px; top: 4px; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary-light); }
.timeline-dot.green { background: var(--success); box-shadow: 0 0 0 2px var(--success-light); }
.timeline-dot.orange { background: var(--warning); box-shadow: 0 0 0 2px var(--warning-light); }
.timeline-dot.red { background: var(--danger); box-shadow: 0 0 0 2px var(--danger-light); }
.timeline-time { font-size: .8rem; color: var(--text-muted); margin-bottom: 4px; }
.timeline-content { background: #f5f5f5; padding: 10px 14px; border-radius: var(--radius); font-size: .9rem; }

/* ===== Notifications ===== */
.notify-container { position: fixed; top: 20px; right: 20px; z-index: 300; display: flex; flex-direction: column; gap: 10px; }
.notify-item {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg);
  padding: 14px 18px; min-width: 280px; max-width: 360px;
  display: flex; align-items: flex-start; gap: 10px; animation: notifyIn .3s ease;
  border-left: 4px solid var(--primary);
}
.notify-item.success { border-left-color: var(--success); }
.notify-item.warning { border-left-color: var(--warning); }
.notify-item.error { border-left-color: var(--danger); }
.notify-item .icon { font-size: 1.2rem; flex-shrink: 0; }
.notify-item .content { flex: 1; }
.notify-item .title { font-weight: 600; font-size: .95rem; margin-bottom: 2px; }
.notify-item .message { font-size: .85rem; color: var(--text-secondary); }
.notify-close { color: var(--text-muted); cursor: pointer; font-size: 1.1rem; }
@keyframes notifyIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
@keyframes notifyOut { to { opacity: 0; transform: translateX(100%); } }

/* ===== Smart Input ===== */
.smart-input-wrap { position: relative; }
.smart-input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius-lg); font-size: 1rem; transition: all .2s; resize: vertical; min-height: 60px; }
.smart-input:focus { outline: none; border-color: var(--primary); }
.smart-hint { margin-top: 8px; padding: 10px 14px; background: var(--primary-light); border-radius: var(--radius); font-size: .85rem; color: var(--text-secondary); }
.smart-hint strong { color: var(--primary); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .menu-toggle { display: block; }
  .sidebar-overlay.show { display: block; }
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .search-bar { flex-direction: column; }
  .header { padding: 0 16px; }
  .content { padding: 16px; }

<body>
<div id="app"></div>

<script>
// ===================== 工具函数 =====================
const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
const formatDate = (d, fmt = 'yyyy-MM-dd HH:mm') => {
  if (!d) return '-';
  const date = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(date)) return '-';
  const pad = n => String(n).padStart(2, '0');
  const map = { yyyy: date.getFullYear(), MM: pad(date.getMonth()+1), dd: pad(date.getDate()), HH: pad(date.getHours()), mm: pad(date.getMinutes()), ss: pad(date.getSeconds()) };
  return fmt.replace(/yyyy|MM|dd|HH|mm|ss/g, m => map[m]);
};
const escapeHtml = str => str == null ? '' : String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
const debounce = (fn, delay) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), delay); }; };


// ===================== API Client =====================
const API_BASE = 'http://localhost:3000/api';
let __token = localStorage.getItem('crm_token') || '';
let __users = [];
let __tickets = [];
let __customers = [];

async function apiFetch(path, opts = {}) {
  const url = `${API_BASE}${path}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...( __token ? { 'Authorization': `Bearer ${__token}` } : {} ),
      ...(opts.headers || {})
    }
  });
  if (res.status === 401) { logout(); throw new Error('未登录'); }
  if (res.status === 403) throw new Error('权限不足');
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error || `HTTP ${res.status}`);
  }
  return res.json().catch(() => ({}));
}

async function loadAllData() {
  try {
    const [users, tickets, customers] = await Promise.all([
      apiFetch('/users'),
      apiFetch('/tickets'),
      apiFetch('/customers')
    ]);
    __users = users || [];
    __tickets = tickets || [];
    __customers = customers || [];
    return true;
  } catch (e) {
    console.error('[API] 加载数据失败:', e);
    return false;
  }
}

// 自动刷新
let __refreshTimer = null;
let __lastRefresh = 0;

async function doRefresh() {
  const btn = document.getElementById('btn-refresh');
  if (btn) { btn.style.animation = 'spin 1s linear infinite'; }
  const ok = await loadAllData();
  if (ok) {
    __lastRefresh = Date.now();
    notify('数据已刷新', '', 'success', 1500);
    // 如果当前在列表页，强制重渲染
    if (currentRoute === 'dashboard' || currentRoute === 'tickets' || currentRoute === 'customers') {
      window.dispatchEvent(new HashChangeEvent('hashchange'));
    }
  } else {
    notify('刷新失败', '请检查后端服务是否启动', 'error', 3000);
  }
  if (btn) { btn.style.animation = ''; }
}

function startAutoRefresh() {
  stopAutoRefresh();
  __refreshTimer = setInterval(async () => {
    if (document.visibilityState === 'visible' && getCurrentUser()) {
      const ok = await loadAllData();
      if (ok && (currentRoute === 'dashboard' || currentRoute === 'tickets' || currentRoute === 'customers')) {
        window.dispatchEvent(new HashChangeEvent('hashchange'));
      }
    }
  }, 30000);
}
function stopAutoRefresh() { if (__refreshTimer) { clearInterval(__refreshTimer); __refreshTimer = null; } }

window.addEventListener('beforeunload', stopAutoRefresh);

const getUsers = () => __users;
const getTickets = () => __tickets;
const getCustomers = () => __customers;

// ===================== Auth (API) =====================
async function loginAsync(username, password, remember) {
  const result = await apiFetch('/login', { method: 'POST', body: JSON.stringify({ username, password }) });
  if (!result.token) return null;
  __token = result.token;
  if (remember) localStorage.setItem('crm_token', __token);
  else sessionStorage.setItem('crm_token', __token);
  await loadAllData();
  startAutoRefresh();
  return result.user;
}

function logout() {
  stopAutoRefresh();
  __token = '';
  localStorage.removeItem('crm_token');
  sessionStorage.removeItem('crm_token');
  __users = []; __tickets = []; __customers = [];
  window.location.hash = '#login';
}

function getCurrentUser() {
  if (!__token) {
    const t = localStorage.getItem('crm_token') || sessionStorage.getItem('crm_token');
    if (t) __token = t;
    else return null;
  }
  try {
    const decoded = atob(__token);
    const [id, username, role] = decoded.split(':');
    const user = __users.find(u => u.id === id);
    if (user) return { ...user, userId: user.id };
    return { id, username, role, userId: id };
  } catch { return null; }
}

const isAdmin = () => { const s = getCurrentUser(); return s && s.role === 'admin'; };
const isEngineer = () => { const s = getCurrentUser(); return s && (s.role === 'engineer' || s.role === 'admin'); };

// ===================== 数据操作 (API + 本地缓存) =====================
async function saveTicketUpdate(id, fields) {
  await apiFetch(`/tickets/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __tickets.findIndex(t => t.id === id);
  if (idx >= 0) Object.assign(__tickets[idx], fields);
}

async function createTicketAsync(ticket) {
  const newT = await apiFetch('/tickets', { method: 'POST', body: JSON.stringify(ticket) });
  __tickets.unshift(newT);
  return newT;
}

async function addTicketComment(id, comment) {
  await apiFetch(`/tickets/${id}/comments`, { method: 'POST', body: JSON.stringify(comment) });
  const t = __tickets.find(tk => tk.id === id);
  if (t) {
    t.comments = t.comments || [];
    t.comments.push({ ...comment, userId: getCurrentUser()?.id, userName: getCurrentUser()?.name, createdAt: new Date().toISOString() });
  }
}

async function createCustomerAsync(c) {
  const newC = await apiFetch('/customers', { method: 'POST', body: JSON.stringify(c) });
  __customers.push(newC);
  return newC;
}

async function updateCustomerAsync(id, fields) {
  await apiFetch(`/customers/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __customers.findIndex(c => c.id === id);
  if (idx >= 0) Object.assign(__customers[idx], fields);
}

async function createUserAsync(u) {
  const newU = await apiFetch('/users', { method: 'POST', body: JSON.stringify(u) });
  __users.push(newU);
  return newU;
}

async function updateUserAsync(id, fields) {
  await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(fields) });
  const idx = __users.findIndex(u => u.id === id);
  if (idx >= 0) Object.assign(__users[idx], fields);
}

async function fetchStats() {
  return apiFetch('/stats');
}

// 初始化数据由后端 seed，前端不再 initData

// ===================== 自然语言解析模块 =====================
function parseTicketInput(text) {
  const result = { title: '', customerId: '', priority: 'medium', category: '', description: text };
  const customers = getCustomers();
  // 提取客户名
  for (const c of customers) {
    if (text.includes(c.name) || text.includes(c.contact)) { result.customerId = c.id; break; }
  }
  // 提取优先级
  if (/紧急|立刻|马上|高优|严重|崩溃|宕机/.test(text)) result.priority = 'high';
  else if (/低优|不急|稍后|低优先级/.test(text)) result.priority = 'low';
  // 提取类别
  const catMap = { '硬件': '硬件故障', '网络': '网络问题', '系统': '系统故障', '软件': '软件问题', '性能': '性能问题', '配置': '配置变更', '存储': '存储问题' };
  for (const [k, v] of Object.entries(catMap)) { if (text.includes(k)) { result.category = v; break; } }
  // 提取标题（取第一句或前20字）
  result.title = text.split(/[，。！？\n]/)[0].slice(0, 30);
  if (!result.title) result.title = '新工单';
  return result;
}

// ===================== 通知系统 =====================
function notify(title, message, type = 'info', duration = 3000) {
  const container = document.getElementById('notify-container') || (() => {
    const el = document.createElement('div'); el.id = 'notify-container'; el.className = 'notify-container'; document.body.appendChild(el); return el;
  })();
  const icons = { info: 'ℹ️', success: '✅', warning: '⚠️', error: '❌' };
  const item = document.createElement('div');
  item.className = `notify-item ${type}`;
  item.innerHTML = `<span class="icon">${icons[type]}</span><div class="content"><div class="title">${escapeHtml(title)}</div><div class="message">${escapeHtml(message)}</div></div><span class="notify-close">&times;</span>`;
  item.querySelector('.notify-close').onclick = () => { item.style.animation = 'notifyOut .3s ease forwards'; setTimeout(() => item.remove(), 300); };
  container.appendChild(item);
  if (duration) setTimeout(() => { if (item.parentNode) { item.style.animation = 'notifyOut .3s ease forwards'; setTimeout(() => item.remove(), 300); } }, duration);
}

// ===================== 路由系统 =====================
const routes = {};
let currentRoute = '';
function route(path, handler) { routes[path] = handler; }
function navigate(path) { window.location.hash = '#' + path; }
function matchRoute(hash) {
  const path = hash.replace(/^#/, '') || 'login';
  for (const [pattern, handler] of Object.entries(routes)) {
    const regex = new RegExp('^' + pattern.replace(/:\w+/g, '([^/]+)') + '$');
    const m = path.match(regex);
    if (m) { currentRoute = path; return () => handler(...m.slice(1)); }
  }
  return null;
}
function renderRoute() {
  const app = document.getElementById('app');
  const user = getCurrentUser();
  const hash = window.location.hash;
  // 未登录只能访问login
  if (!user && hash !== '#login') { window.location.hash = '#login'; return; }
  const handler = matchRoute(hash);
  if (handler) { app.innerHTML = ''; handler(); }
  else { app.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="title">页面未找到</div></div>'; }
}
window.addEventListener('hashchange', renderRoute);

// ===================== 布局渲染 =====================
function renderLayout(contentFn) {
  const user = getCurrentUser();

  const app = document.getElementById('app');

        <div class="sidebar-brand"><span class="icon">🛠️</span> 技术支持系统</div>

          ${isAdminUser ? `<div class="nav-group-title">管理员</div>
          <div class="nav-item ${currentRoute==='admin/team'?'active':''}" onclick="navigate('admin/team')"><span class="icon">👨‍💻</span> 团队设置</div>
          <div class="nav-item ${currentRoute==='admin/stats'?'active':''}" onclick="navigate('admin/stats')"><span class="icon">📈</span> 统计报表</div>` : ''}
        </nav>
      </aside>
      <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
      <div class="main">
        <header class="header">
          <div class="header-left">
            <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
            <span class="font-sm text-muted">${formatDate(new Date(), 'yyyy年MM月dd日')}</span>
          </div>
          <div class="header-right">
            <button class="badge-btn" id="btn-refresh" onclick="doRefresh()" title="刷新数据">🔄</button>
            <div class="dropdown" id="notify-dropdown">
              <button class="badge-btn" onclick="toggleNotifyDropdown()">🔔 ${getUnreadCount() > 0 ? `<span class="badge">${getUnreadCount()}</span>` : ''}</button>
              <div class="dropdown-menu" id="notify-menu" style="width:320px;max-height:360px;overflow-y:auto;"></div>
            </div>
            <div class="dropdown" id="user-dropdown">
              <div class="user-info" onclick="toggleUserDropdown()">
                <div class="user-avatar">${user.name.charAt(0)}</div>
                <span class="font-sm font-bold">${user.name}</span>
                <span class="font-sm text-muted">▼</span>
              </div>
              <div class="dropdown-menu">
                <div class="dropdown-item" onclick="navigate('dashboard')"><span>📊</span> 仪表盘</div>
                <div class="dropdown-item" onclick="doLogout()"><span>🚪</span> 退出登录</div>
              </div>
            </div>
          </div>
        </header>
        <div class="content" id="page-content"></div>
      </div>
    </div>`;
  contentFn(document.getElementById('page-content'));
  updateNotifyMenu();
}

function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('show'); }
function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }
function toggleUserDropdown() { document.getElementById('user-dropdown').classList.toggle('open'); }
function toggleNotifyDropdown() { document.getElementById('notify-dropdown').classList.toggle('open'); }
function doLogout() { stopAutoRefresh(); logout(); notify('已退出', '您已成功退出系统', 'success'); navigate('login'); }

// 提醒/通知数据（后端持久化）
let __remindersCache = [];
async function loadReminders() {
  try { __remindersCache = await apiFetch('/reminders'); } catch(e) { console.warn('[Reminders] 加载失败:', e); }
}
function getReminders() { return __remindersCache; }
function saveReminders(v) { __remindersCache = v; }
async function addReminder(ticketId, toUserId, message) {
  const r = { id: generateId(), ticketId, toUserId, message, fromUserId: getCurrentUser().userId, fromName: getCurrentUser().name, createdAt: new Date().toISOString(), read: false };
  try { await apiFetch('/reminders', { method: 'POST', body: JSON.stringify(r) }); __remindersCache.push(r); } catch(e) { console.warn('[Reminders] 添加失败:', e); }
}
async function readReminderAsync(id) {
  try { await apiFetch(`/reminders/${id}/read`, { method: 'PUT' }); } catch(e) {}
  const r = __remindersCache.find(x => x.id === id);
  if (r) r.read = true;
}
async function clearAllRemindersAsync() {
  const uid = getCurrentUser()?.userId;
  try { await apiFetch('/reminders/clear', { method: 'POST' }); } catch(e) {}
  __remindersCache = __remindersCache.map(r => r.toUserId === uid ? {...r, read: true} : r);
}
function getUnreadCount() {
  const uid = getCurrentUser()?.userId;
  return getReminders().filter(r => r.toUserId === uid && !r.read).length;
}
function updateNotifyMenu() {
  const menu = document.getElementById('notify-menu');
  if (!menu) return;
  const uid = getCurrentUser()?.userId;
  const list = getReminders().filter(r => r.toUserId === uid).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,20);
  if (!list.length) { menu.innerHTML = '<div class="dropdown-item text-muted">暂无提醒</div>'; return; }
  menu.innerHTML = list.map(r => `<div class="dropdown-item" style="${r.read?'':'background:#e6f7ff;'}" onclick="readReminderAsync('${r.id}')">
    <div><div class="font-sm font-bold">${escapeHtml(r.fromName)} 的提醒</div><div class="font-sm">${escapeHtml(r.message)}</div><div class="font-sm text-muted">${formatDate(r.createdAt)}</div></div>
  </div>`).join('') + '<div class="dropdown-item text-center text-primary" onclick="clearAllRemindersAsync()">全部已读</div>';
}
async function readReminder(id) {
  await readReminderAsync(id);
  updateNotifyMenu();
  const r = getReminders().find(x => x.id === id);
  if (r && r.ticketId) navigate('ticket/' + r.ticketId);
}
async function clearAllReminders() {
  await clearAllRemindersAsync();
  updateNotifyMenu();
}

  app.innerHTML = `

      <div class="login-float-shapes">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <div class="login-card">

          <h1>技术支持工单系统</h1>

window.togglePassword = () => {
  const passInput = document.getElementById('login-pass');
  const toggle = document.querySelector('.toggle-pass');
  if (passInput.type === 'password') { passInput.type = 'text'; toggle.textContent = '🙈'; }
  else { passInput.type = 'password'; toggle.textContent = '👁️'; }
};
window.bindLoginEvents = () => {
  const form = document.getElementById('login-form');
  if (!form) return;
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    handleLogin();
  });
  document.getElementById('login-pass')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
  });
};
window.handleLogin = async () => {
  const form = document.getElementById('login-form');
  if (!form) return;
  const btn = document.getElementById('login-btn');
  const btnText = btn.querySelector('.btn-text');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>登录中...';
  try {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const remember = document.getElementById('login-remember')?.checked;
    const user = await loginAsync(u, p, remember);
    if (user) {
      notify('登录成功', `欢迎回来，${user.name}`, 'success');
      navigate('dashboard');
    } else {
      notify('登录失败', '用户名或密码错误', 'error');
      btn.disabled = false;
      btnText.textContent = '登 录';
    }
  } catch (e) {
    notify('登录失败', e.message || '网络错误，请检查后端服务是否启动', 'error');
    btn.disabled = false;
    btnText.textContent = '登 录';
  }
};

// ===================== Dashboard =====================
route('dashboard', () => {
  if (!getCurrentUser()) return navigate('login');
  const isAdminUser = isAdmin();
  renderLayout(container => {
    const tickets = getTickets();
    const customers = getCustomers();
    const users = getUsers();
    const total = tickets.length;
    const pending = tickets.filter(t => t.status === 'pending').length;
    const processing = tickets.filter(t => t.status === 'processing').length;
    const resolved = tickets.filter(t => t.status === 'resolved').length;
    const highPriority = tickets.filter(t => t.priority === 'high' && t.status !== 'resolved').length;
    const overdue = tickets.filter(t => t.status !== 'resolved' && new Date(t.dueDate) < new Date()).length;

    container.innerHTML = `
      <h1 class="page-title">📊 仪表盘</h1>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon blue">🎫</div><div><div class="stat-value">${total}</div><div class="stat-label">全部工单</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">⏳</div><div><div class="stat-value">${pending}</div><div class="stat-label">待处理</div></div></div>
        <div class="stat-card"><div class="stat-icon cyan">🔄</div><div><div class="stat-value">${processing}</div><div class="stat-label">处理中</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${resolved}</div><div class="stat-label">已解决</div></div></div>
        <div class="stat-card"><div class="stat-icon red">🔥</div><div><div class="stat-value">${highPriority}</div><div class="stat-label">高优先级</div></div></div>
        ${isAdminUser ? `<div class="stat-card"><div class="stat-icon blue">👥</div><div><div class="stat-value">${customers.length}</div><div class="stat-label">客户数量</div></div></div>` : ''}
      </div>
      ${overdue > 0 ? `<div class="card mb-4" style="border-left:4px solid var(--danger);"><div class="card-body"><strong>⚠️ 有 ${overdue} 个工单已逾期，请尽快处理！</strong></div></div>` : ''}

function getMyTickets() {
  const uid = getCurrentUser()?.userId;
  return getTickets().filter(t => t.engineerId === uid || isAdmin()).sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt));
}
function statusTag(s) {
  const map = { pending: '<span class="tag tag-orange">待处理</span>', processing: '<span class="tag tag-blue">处理中</span>', resolved: '<span class="tag tag-green">已解决</span>', closed: '<span class="tag tag-gray">已关闭</span>' };
  return map[s] || s;
}
function priorityTag(p) {
  const map = { high: '<span class="tag tag-red">高</span>', medium: '<span class="tag tag-orange">中</span>', low: '<span class="tag tag-green">低</span>' };
  return map[p] || p;
}

window.submitNewTicket = async () => {
  const title = document.getElementById('new-title').value.trim();
  const customerId = document.getElementById('new-customer').value;
  const engineerId = document.getElementById('new-engineer').value;
  const priority = document.getElementById('new-priority').value;
  const category = document.getElementById('new-category').value;
  const description = document.getElementById('new-desc').value.trim();
  if (!title) { notify('请填写标题', '', 'warning'); return; }
  try {
    const now = new Date().toISOString();
    const due = new Date(Date.now() + 86400000 * (priority==='high'?1:priority==='medium'?3:7)).toISOString();
    const id = 'TK' + String(Date.now()).slice(-6);
    await createTicketAsync({
      id, title, customerId, engineerId, status: 'pending', priority, category, description,
      createdAt: now, updatedAt: now, dueDate: due, creatorId: getCurrentUser().id, comments: []
    });
    // 给被指派的工程师发送提醒
    addReminder(id, engineerId, `您有一个新工单被指派：${title}`);
    notify('创建成功', `工单 ${id} 已创建`, 'success');
    document.querySelector('.modal-overlay').remove();
    if (currentRoute === 'tickets') { window.dispatchEvent(new HashChangeEvent('hashchange')); }
    else { navigate('tickets'); }
  } catch (e) {
    notify('创建失败', e.message, 'error');
  }
};

    document.querySelector('.modal-overlay').remove();

    const statusCounts = { pending: 0, processing: 0, resolved: 0 };
    tickets.forEach(t => { if (statusCounts[t.status] !== undefined) statusCounts[t.status]++; });
    const priorityCounts = { high: tickets.filter(t=>t.priority==='high').length, medium: tickets.filter(t=>t.priority==='medium').length, low: tickets.filter(t=>t.priority==='low').length };
    const categoryCounts = {};
    tickets.forEach(t => { categoryCounts[t.category] = (categoryCounts[t.category] || 0) + 1; });
    const engineerStats = users.filter(u=>u.role==='engineer').map(u => {
      const ts = tickets.filter(t => t.engineerId === u.id);
      return { name: u.name, total: ts.length, resolved: ts.filter(t=>t.status==='resolved').length, processing: ts.filter(t=>t.status==='processing').length, pending: ts.filter(t=>t.status==='pending').length };
    });
    // 最近7天工单趋势
    const dailyCounts = {};
    for (let i=6; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const key = `${d.getMonth()+1}/${d.getDate()}`;
      dailyCounts[key] = tickets.filter(t => { const cd = new Date(t.createdAt); return cd.getDate()===d.getDate() && cd.getMonth()===d.getMonth(); }).length;
    }
    const maxDaily = Math.max(...Object.values(dailyCounts), 1);
    container.innerHTML = `
      <h1 class="page-title">📈 统计报表</h1>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-icon blue">🎫</div><div><div class="stat-value">${tickets.length}</div><div class="stat-label">总工单</div></div></div>
        <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${Math.round((statusCounts.resolved/tickets.length)*100)||0}%</div><div class="stat-label">解决率</div></div></div>
        <div class="stat-card"><div class="stat-icon orange">⏱️</div><div><div class="stat-value">${tickets.filter(t=>t.status!=='resolved').length}</div><div class="stat-label">未完成</div></div></div>
        <div class="stat-card"><div class="stat-icon cyan">👥</div><div><div class="stat-value">${customers.length}</div><div class="stat-label">客户数</div></div></div>
      </div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px;">
        <div class="card">
          <div class="card-header"><span class="card-title">工单状态分布</span></div>
          <div class="card-body">
            <div style="display:flex; gap: 8px; margin-bottom: 12px;">
              <div style="flex:${statusCounts.pending}; background:var(--warning); height:24px; border-radius:4px 0 0 4px;" title="待处理"></div>
              <div style="flex:${statusCounts.processing}; background:var(--primary); height:24px;" title="处理中"></div>
              <div style="flex:${statusCounts.resolved}; background:var(--success); height:24px; border-radius:0 4px 4px 0;" title="已解决"></div>
            </div>
            <div class="flex flex-center gap-2">
              <span class="tag tag-orange">待处理 ${statusCounts.pending}</span>
              <span class="tag tag-blue">处理中 ${statusCounts.processing}</span>
              <span class="tag tag-green">已解决 ${statusCounts.resolved}</span>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-title">优先级分布</span></div>
          <div class="card-body">
            <div style="display:flex; gap: 8px; margin-bottom: 12px;">
              <div style="flex:${priorityCounts.high}; background:var(--danger); height:24px; border-radius:4px 0 0 4px;" title="高"></div>
              <div style="flex:${priorityCounts.medium}; background:var(--warning); height:24px;" title="中"></div>
              <div style="flex:${priorityCounts.low}; background:var(--success); height:24px; border-radius:0 4px 4px 0;" title="低"></div>
            </div>
            <div class="flex flex-center gap-2">
              <span class="tag tag-red">高 ${priorityCounts.high}</span>
              <span class="tag tag-orange">中 ${priorityCounts.medium}</span>
              <span class="tag tag-green">低 ${priorityCounts.low}</span>
            </div>
          </div>
        </div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">📅 近7天工单趋势</span></div>
        <div class="card-body">
          <div style="display:flex; align-items:flex-end; gap: 12px; height:120px; padding: 10px 0;">
            ${Object.entries(dailyCounts).map(([k,v]) => `<div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:100%; background:var(--primary); border-radius:4px 4px 0 0; height:${(v/maxDaily*100)||4}px; min-height:4px; transition:height .3s;"></div><div class="font-sm text-muted">${k}</div><div class="font-sm font-bold">${v}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">👨‍💻 工程师工作统计</span></div>
        <div class="card-body" style="padding:0;"><div class="table-wrap">
          <table class="data-table"><thead><tr><th>工程师</th><th>总工单</th><th>已解决</th><th>处理中</th><th>待处理</th><th>解决率</th></tr></thead>
          <tbody>${engineerStats.map(s => `<tr><td>${escapeHtml(s.name)}</td><td>${s.total}</td><td>${s.resolved}</td><td>${s.processing}</td><td>${s.pending}</td><td>${s.total?Math.round(s.resolved/s.total*100):0}%</td></tr>`).join('')}</tbody>
          </table>
        </div></div>
      </div>
      <div class="card mt-4">
        <div class="card-header"><span class="card-title">📂 分类统计</span></div>
        <div class="card-body">
          <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px;">
            ${Object.entries(categoryCounts).map(([k,v]) => `<div style="background:#f5f5f5; padding:12px 16px; border-radius:var(--radius); display:flex; justify-content:space-between; align-items:center;"><span>${escapeHtml(k)}</span><span class="font-bold text-primary">${v}</span></div>`).join('')}
          </div>
        </div>
      </div>`;
  });
});

// ===================== 初始化 =====================
document.addEventListener('DOMContentLoaded', async () => {
  if (__token) {
    const ok = await loadAllData();
    if (!ok) {
      console.warn('[CRM] 后端连接失败，请确保服务器已启动');
    } else {
      startAutoRefresh();
    }
  }
  renderRoute();
});
</script>
</body>
</html>
